name: Deploy HERMES Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install duckdb==1.5.2 folium

      - name: Ensure empty tables exist
        run: |
          python -c "
          import duckdb, os
          con = duckdb.connect('md:hermes01')
          con.execute('CREATE TABLE IF NOT EXISTS raw_events (event_id VARCHAR PRIMARY KEY, event_type VARCHAR, vehicle_id VARCHAR, node_id INTEGER, payload JSON, emitted_at DOUBLE)')
          con.execute('CREATE TABLE IF NOT EXISTS processed_events (event_id VARCHAR PRIMARY KEY, severity VARCHAR, category VARCHAR, sla_risk_score DOUBLE, action_taken VARCHAR, processed_at DOUBLE)')
          con.execute('CREATE TABLE IF NOT EXISTS agent_logs (tick_id VARCHAR, run_id VARCHAR, agent_name VARCHAR, started_at DOUBLE, completed_at DOUBLE, input_summary VARCHAR, output_summary VARCHAR, decision VARCHAR, llm_model VARCHAR, tokens_used INTEGER)')
          con.close()
          print('Tables ensured')
          "
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

      - name: Install dashboard deps
        run: npm ci --legacy-peer-deps
        working-directory: dashboard

      - name: Generate sources from MotherDuck
        run: npx evidence sources
        working-directory: dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

      - name: Build dashboard
        run: npm run build
        working-directory: dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dashboard/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
